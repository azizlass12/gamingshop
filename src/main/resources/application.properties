# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=gaming-shop-backend
server.port=8083

# ============================================
# DATABASE
# ============================================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/gamingshop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.generate-ddl=true
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================
# JWT
# ============================================
app.jwt.secret=${JWT_SECRET:GamingShopSuperSecretKeyForJWTTokenGeneration2024VeryLongKey}
app.jwt.expiration=86400000

# ============================================
# CORS
# ============================================
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}

# ============================================
# FILE UPLOAD (images produits)
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/products
